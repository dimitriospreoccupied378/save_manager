name: Build and Release Windows EXE

on:
  push:
    branches:
      - main
      - master
    paths:
      - main.py
      - steam_save_manager.py
      - SteamSaveManager.spec
      - requirements.txt
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: SteamSaveManager
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: Package Windows Executable
    runs-on: windows-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Resolve build target
        id: target
        shell: pwsh
        run: |
          if (Test-Path main.py) {
            $entry = "main.py"
          } elseif (Test-Path steam_save_manager.py) {
            $entry = "steam_save_manager.py"
          } else {
            throw "No entry script found. Expected main.py or steam_save_manager.py."
          }

          $useSpec = $false
          if (Test-Path "SteamSaveManager.spec") {
            $specContent = Get-Content "SteamSaveManager.spec" -Raw
            if ($specContent -match [regex]::Escape("'$entry'")) {
              $useSpec = $true
            } elseif ($specContent -match [regex]::Escape('"' + $entry + '"')) {
              $useSpec = $true
            }
          }

          "entry=$entry" >> $env:GITHUB_OUTPUT
          "use_spec=$($useSpec.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: 3. Extract version and create tag
        id: version
        shell: pwsh
        run: |
          $entry = "${{ steps.target.outputs.entry }}"
          $content = Get-Content $entry -Raw
          $match = [regex]::Match($content, '(?m)^\s*(?:CURRENT_VERSION|VERSION)\s*=\s*"([^"]+)"')
          if (-not $match.Success) {
            throw "Failed to extract CURRENT_VERSION or VERSION from $entry"
          }

          $version = $match.Groups[1].Value
          $releaseTag = "v$version"
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          Write-Host "Detected version: $releaseTag"

          git fetch --tags
          git rev-parse $releaseTag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Tag $releaseTag already exists. Skipping build."
            "skip_build=true" >> $env:GITHUB_OUTPUT
          } else {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a $releaseTag -m "Release $releaseTag"
            git push origin $releaseTag
            Write-Host "Created and pushed tag: $releaseTag"
            "skip_build=false" >> $env:GITHUB_OUTPUT
          }

      - name: 4. Set up Python
        if: steps.version.outputs.skip_build != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 5. Install dependencies
        if: steps.version.outputs.skip_build != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          } else {
            pip install customtkinter pillow psutil watchdog pystray pyinstaller
          }

      - name: 6. Install UPX
        if: steps.version.outputs.skip_build != 'true'
        shell: pwsh
        run: choco install upx -y

      - name: 7. Verify source compiles
        if: steps.version.outputs.skip_build != 'true'
        shell: pwsh
        run: python -m py_compile "${{ steps.target.outputs.entry }}"

      - name: 8. Clean old build output
        if: steps.version.outputs.skip_build != 'true'
        shell: pwsh
        run: |
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          if (Test-Path release) { Remove-Item release -Recurse -Force }

      - name: 9. Build executable
        if: steps.version.outputs.skip_build != 'true'
        shell: pwsh
        env:
          PYTHONIOENCODING: utf8
        run: |
          if ("${{ steps.target.outputs.use_spec }}" -eq "true") {
            pyinstaller --clean SteamSaveManager.spec
          } else {
            pyinstaller --clean --noconsole --onefile --name "${{ env.APP_NAME }}" "${{ steps.target.outputs.entry }}"
          }

      - name: 10. Prepare release files
        if: steps.version.outputs.skip_build != 'true'
        id: package
        shell: pwsh
        run: |
          $exePath = Join-Path $PWD "dist\${{ env.APP_NAME }}.exe"
          $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()
          "exe_path=$exePath" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT

      - name: 11. Extract latest commit notes
        if: steps.version.outputs.skip_build != 'true'
        shell: bash
        run: |
          ENTRY_FILE="${{ steps.target.outputs.entry }}"
          RAW_NOTES="$(git log --format="%b" -1 -- "$ENTRY_FILE" || true)"
          CLEAN_NOTES="$(printf '%s\n' "$RAW_NOTES" | sed '/^[[:space:]]*$/d')"
          if [ -z "$CLEAN_NOTES" ]; then
            printf 'Regular updates and improvements\n' > release_notes.txt
            printf '1. Regular updates and improvements\n' > update_notes.txt
          else
            printf '%s\n' "$CLEAN_NOTES" > release_notes.txt
            printf '%s\n' "$CLEAN_NOTES" | sed -E 's/^[[:space:]]*[-*][[:space:]]+//' | nl -w1 -s'. ' > update_notes.txt
          fi
          cat release_notes.txt
      - name: 12. Create GitHub release
        if: steps.version.outputs.skip_build != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.exe_path }}
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          body_path: release_notes.txt
          prerelease: ${{ contains(steps.version.outputs.release_tag, 'alpha') || contains(steps.version.outputs.release_tag, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 13. Update remote update manifest
        if: steps.version.outputs.skip_build != 'true'
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.release_tag }}"
          $version = $tag.TrimStart("v")
          $exeUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/${{ env.APP_NAME }}.exe"
          $manifestDir = Join-Path $PWD "update"
          $manifestPath = Join-Path $manifestDir "update.json"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null
          $notesPath = Join-Path $PWD "update_notes.txt"
          $notes = if (Test-Path $notesPath) {
            Get-Content $notesPath -Raw
          } else {
            "1. Regular updates and improvements"
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "1. Regular updates and improvements"
          }

          $manifest = @{
            version = $version
            notes = $notes
            url = $exeUrl
            sha256 = "${{ steps.package.outputs.sha256 }}"
          } | ConvertTo-Json -Depth 4

          Set-Content -Path $manifestPath -Value $manifest -Encoding UTF8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${{ github.ref_name }}"
          git checkout "${{ github.ref_name }}"
          git add update/update.json
          git commit -m "chore: update manifest for $version" || exit 0
          git push origin "${{ github.ref_name }}"



